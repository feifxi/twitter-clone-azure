version: "2"
sql:
  - engine: "postgresql"
    queries: "db/query"
    schema: "db/migration"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        emit_interface: true
        overrides:
          - db_type: "pg_catalog.timestamp"
            go_type:
              type: "Time"
              import: "time"
          - db_type: "pg_catalog.timestamptz"
            go_type:
              type: "Time"
              import: "time"
