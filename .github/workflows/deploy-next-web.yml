name: Deploy Next.js Web

on:
  push:
    branches: 
      [ main ]
    paths:
    - 'twitter-next-web/**'
    - '.github/workflows/deploy-next-web.yml'

  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: twitter-next-web/package-lock.json

      - name: Install dependencies
        working-directory: twitter-next-web
        run: npm ci

      - name: Lint
        working-directory: twitter-next-web
        run: npm run -s lint

      - name: Type check
        working-directory: twitter-next-web
        run: npx tsc --noEmit

      - name: Build
        working-directory: twitter-next-web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CACHNTWTWEBDEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CACHNTWTWEBDEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CACHNTWTWEBDEV_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/twitter-next-web
          dockerfilePath: Dockerfile
          registryUrl: crchntwtdevsea001.azurecr.io
          registryUsername: ${{ secrets.CACHNTWTWEBDEV_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CACHNTWTWEBDEV_REGISTRY_PASSWORD }}
          containerAppName: ca-chntwt-web-dev
          resourceGroup: rg-chntwt-dev-sea
          imageToBuild: crchntwtdevsea001.azurecr.io/ca-chntwt-web-dev:${{ github.sha }}
          buildArguments: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
